services:
  api:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    env_file: .env
    ports: ["8000:8000"]
    volumes: ["./data:/data"]
    depends_on: [redis]
    restart: unless-stopped
  worker:
    build: .
    command: rq worker audits --url ${REDIS_URL:-redis://redis:6379/0}
    env_file: .env
    volumes: ["./data:/data"]
    depends_on: [redis]
    restart: unless-stopped
  redis:
    image: redis:7-alpine
    restart: unless-stopped
